name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NTHLAYER_LEARN_GIT: "nthlayer-learn@git+https://github.com/rsionnach/nthlayer-learn.git@main#subdirectory=lib/python"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install "$NTHLAYER_LEARN_GIT"
          uv pip install -e ".[dev]"

      - name: Run linting
        run: .venv/bin/ruff check src/ tests/ --ignore E501,B008,F841,B007,E402,E721,E722,B012,I001,F821,E741

      - name: Run tests
        run: .venv/bin/pytest tests/ -v --tb=short -x

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv
          uv pip install "$NTHLAYER_LEARN_GIT"
          uv pip install -e ".[dev]"

      - name: Run ruff
        run: .venv/bin/ruff check src/ tests/ --ignore E501,B008,F841,B007,E402,E721,E722,B012,I001,F821,E741

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv
          uv pip install "$NTHLAYER_LEARN_GIT"
          uv pip install -e ".[dev]"

      - name: Run pip-audit
        run: |
          uv pip install pip-audit
          .venv/bin/pip-audit --progress-spinner off || echo "pip-audit found vulnerabilities (non-blocking)"
